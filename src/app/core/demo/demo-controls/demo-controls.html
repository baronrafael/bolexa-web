<details class="dropdown dropdown-end">
  <summary class="btn btn-outline btn-sm border-white/15 text-slate-200 hover:border-primary hover:bg-primary/10 hover:text-white">
    {{ labels.trigger }}
  </summary>

  <div class="dropdown-content z-50 mt-3 w-80 rounded-[1.5rem] border border-white/10 bg-base-300/95 p-4 text-left shadow-2xl backdrop-blur">
    <p class="text-xs font-semibold uppercase tracking-[0.2em] text-primary">{{ labels.title }}</p>
    <p class="mt-2 text-sm leading-6 text-slate-300">{{ labels.description }}</p>

    <div class="mt-4 grid gap-2 text-xs text-slate-300">
      <p class="rounded-2xl border border-white/10 bg-white/[0.04] p-3 font-semibold">{{ labels.featuredEvent }}</p>
      <p class="rounded-2xl border border-white/10 bg-white/[0.04] p-3 font-mono font-semibold">{{ labels.qrCode }}</p>
    </div>

    <div class="mt-4 grid grid-cols-2 gap-2">
      @for (link of demoLinks; track link.path) {
        <a class="btn btn-ghost btn-sm justify-start" [routerLink]="link.path">{{ link.label }}</a>
      }
    </div>

    <button class="btn btn-error btn-sm mt-4 w-full" type="button" (click)="resetDemoData()">
      {{ labels.reset }}
    </button>

    @if (resetDone()) {
      <p class="mt-3 rounded-2xl border border-success/30 bg-success/10 p-3 text-xs font-semibold text-success">{{ labels.resetDone }}</p>
    }
  </div>
</details>
