<section class="rounded-[1.5rem] border border-white/10 bg-base-300/70 p-6 shadow-2xl">
  <h2 class="text-2xl font-black text-white">{{ labels().buyerInfo }}</h2>
  <div class="mt-5 grid gap-4 md:grid-cols-3">
    <label class="form-control">
      <span class="label-text mb-2 text-slate-300">{{ labels().fields.name }}</span>
      <input
        class="input input-bordered border-white/10 bg-white/[0.04]"
        type="text"
        [attr.aria-describedby]="buyerNameError() ? 'checkout-name-error' : null"
        [attr.aria-invalid]="buyerNameError() ? 'true' : null"
        [placeholder]="labels().placeholders.name"
        [value]="buyerName()"
        (input)="updateBuyerName($event)"
      />
      @if (buyerNameError(); as message) {
        <span id="checkout-name-error" class="mt-2 text-xs font-semibold text-error">{{
          message
        }}</span>
      }
    </label>
    <label class="form-control">
      <span class="label-text mb-2 text-slate-300">{{ labels().fields.email }}</span>
      <input
        class="input input-bordered border-white/10 bg-white/[0.04]"
        type="email"
        [attr.aria-describedby]="buyerEmailError() ? 'checkout-email-error' : null"
        [attr.aria-invalid]="buyerEmailError() ? 'true' : null"
        [placeholder]="labels().placeholders.email"
        [value]="buyerEmail()"
        (input)="updateBuyerEmail($event)"
      />
      @if (buyerEmailError(); as message) {
        <span id="checkout-email-error" class="mt-2 text-xs font-semibold text-error">{{
          message
        }}</span>
      }
    </label>
    <label class="form-control">
      <span class="label-text mb-2 text-slate-300">{{ labels().fields.phone }}</span>
      <input
        class="input input-bordered border-white/10 bg-white/[0.04]"
        type="tel"
        [placeholder]="labels().placeholders.phone"
        [value]="buyerPhone()"
        (input)="updateBuyerPhone($event)"
      />
    </label>
  </div>
</section>
