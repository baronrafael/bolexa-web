<label class="sr-only" [for]="id()">{{ label() }}</label>
<div
  class="flex items-center gap-2 rounded-2xl border border-white/10 bg-white/[0.04] px-4 py-2 focus-within:border-primary/60 focus-within:ring-2 focus-within:ring-primary/20"
>
  <input
    class="input input-ghost h-10 min-h-10 flex-1 px-0 text-base text-white placeholder:text-slate-500 focus:outline-none"
    type="search"
    [id]="id()"
    [placeholder]="placeholder()"
    [value]="value()"
    (input)="handleInput($event)"
  />

  @if (value()) {
    <button class="btn btn-ghost btn-xs" type="button" (click)="clear()">{{ labels.clear }}</button>
  }
</div>
