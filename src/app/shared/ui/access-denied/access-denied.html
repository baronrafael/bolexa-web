<section class="mx-auto max-w-3xl px-5 py-12 sm:px-8 sm:py-16">
  <div class="rounded-[2rem] border border-white/10 bg-base-300/70 p-8 text-center shadow-2xl sm:p-10">
    <p class="text-sm font-semibold uppercase tracking-[0.24em] text-primary">{{ labels.code }}</p>
    <h1 class="mt-4 text-3xl font-black text-white sm:text-4xl">{{ labels.title }}</h1>
    <p class="mx-auto mt-4 max-w-xl text-slate-300">{{ description() }}</p>

    <div class="mt-8 flex flex-wrap items-center justify-center gap-3">
      <a class="btn btn-primary" routerLink="/">{{ labels.actions.home }}</a>
      @if (showEventsAction()) {
        <a class="btn btn-ghost border-white/10" routerLink="/events">{{
          labels.actions.events
        }}</a>
      }
      @if (showSellAction()) {
        <a class="btn btn-ghost border-white/10" routerLink="/sell">{{
          labels.actions.sell
        }}</a>
      }
    </div>
  </div>
</section>
