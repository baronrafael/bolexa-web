<article class="rounded-[1.5rem] border border-white/10 bg-base-300/70 p-5 shadow-2xl">
  @if (eyebrow(); as eyebrowText) {
    <p class="text-xs font-semibold uppercase tracking-[0.22em] text-slate-400">{{ eyebrowText }}</p>
  }

  <div class="mt-4 flex items-start justify-between gap-4">
    <div>
      <h3 class="text-sm font-medium text-slate-300">{{ title() }}</h3>
      <p class="mt-2 text-3xl font-black text-white">{{ value() }}</p>
    </div>
    <span class="size-3 rounded-full border" [class]="accentClass()"></span>
  </div>

  @if (description(); as descriptionText) {
    <p class="mt-4 text-sm text-slate-400">{{ descriptionText }}</p>
  }
</article>
